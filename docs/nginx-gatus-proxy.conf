# Add this location block to the www.rotko.net nginx server block
# Proxies /api/gatus/ to the Gatus API at status.rotko.net
# This avoids CORS issues since the browser fetches from the same origin

location /api/gatus/ {
    proxy_pass https://status.rotko.net/api/v1/;
    proxy_set_header Host status.rotko.net;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_ssl_server_name on;
    proxy_cache_valid 200 30s;
    proxy_read_timeout 10s;
    proxy_connect_timeout 5s;
}
